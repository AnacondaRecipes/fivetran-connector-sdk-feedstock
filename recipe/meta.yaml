{% set name = "fivetran-connector-sdk" %}
{% set version = "1.4.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: bb2280d0e966504d91b22f2912ca74b39076fa57d81c8d6d822f6368608c571d
  patches:
    - patches/0001-update-dependencies.patch

build:
  number: 0
  entry_points:
    - fivetran = fivetran_connector_sdk:main
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  # py 3.13 not supported due to pipreq dependency
  # https://inspector.pypi.io/project/pipreqs/0.5.0/packages/12/4c/0a335b1b70c7e1821140ac6f884b51d47f049bcb600fa19bb374922f73aa/pipreqs-0.5.0.tar.gz/pipreqs-0.5.0/pyproject.toml#line.28
  skip: True  # [py<39 or py>312]

requirements:
  build:
    - patch # [not win]
    - m2-patch # [win]
  host:
    - python
    - setuptools >=61.0
    - wheel
    - pip
  run:
    - python
    - grpcio >=1.60.1
    - grpcio-tools >=1.60.1
    - requests >=2.32.3
    - pipreqs >=0.5.0
    - unidecode >=1.3.8

test:
  imports:
    - fivetran_connector_sdk
  commands:
    - pip check
    - fivetran --help
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
  requires:
    - pip

about:
  home: https://github.com/fivetran/fivetran_connector_sdk
  summary: Fivetran Connector SDK allows Real-time, efficient data replication to your destination of choice.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  description: Explore practical examples and helpful resources for building custom data connectors with the
   Fivetran Connector SDK. Learn how to develop and deploy custom data connectors in Python, and extend Fivetran’s 
   capabilities to fit your data integration needs.
  doc_url: https://fivetran.com/docs/connector-sdk
  dev_url: https://github.com/fivetran/fivetran_connector_sdk

extra:
  recipe-maintainers:
    - PatrykKups
